<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写真一括リネーム＆ZIPダウンロード</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JSZip for creating ZIP files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Exifr for extracting EXIF date taken -->
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <style>
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        <!-- Header -->
        <header class="text-center">
            <h1 class="text-3xl font-bold text-blue-600 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                写真一括リネーム＆ZIPツール
            </h1>
            <p class="text-gray-500 mt-2">撮影日時順に並び替え、「物件名＋部屋番号_0001」の形式でリネームします。</p>
        </header>

        <!-- Main Card -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <!-- Input Section -->
                <div class="space-y-4">
                    <div>
                        <label for="propName" class="block text-sm font-medium text-gray-700 mb-1">物件名</label>
                        <input type="text" id="propName" placeholder="例: グランデージ新宿" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label for="roomNum" class="block text-sm font-medium text-gray-700 mb-1">部屋番号</label>
                        <input type="text" id="roomNum" placeholder="例: 101" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                </div>

                <!-- File Upload Section -->
                <div class="flex flex-col justify-end">
                    <label class="block text-sm font-medium text-gray-700 mb-1">写真を選択 (複数可)</label>
                    <div class="relative border-2 border-dashed border-gray-300 rounded-lg px-6 py-8 text-center hover:bg-blue-50 transition-colors cursor-pointer" id="dropZone">
                        <input type="file" id="fileInput" multiple accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-10 w-10 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <p class="text-sm text-gray-600 font-medium">クリックして写真を選択、またはドラッグ＆ドロップ</p>
                        <p class="text-xs text-gray-500 mt-1" id="fileCountText">ファイルは選択されていません</p>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-between items-center pt-4 border-t border-gray-100">
                <button id="clearBtn" class="px-4 py-2 text-sm font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition-colors hidden">
                    クリア
                </button>
                <div class="flex-1"></div>
                <button id="downloadBtn" disabled class="px-6 py-3 font-semibold text-white bg-blue-600 rounded-lg shadow-sm hover:bg-blue-700 focus:ring-4 focus:ring-blue-200 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    ZIPでダウンロード
                </button>
            </div>
        </div>

        <!-- Preview Section -->
        <div>
            <h2 class="text-lg font-semibold text-gray-800 mb-3 flex items-center gap-2">
                プレビュー (撮影日時順)
                <span id="previewBadge" class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full hidden">0 枚</span>
            </h2>
            <div id="previewGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Preview items will be inserted here -->
                <div class="col-span-full text-center py-10 text-gray-400 bg-white rounded-xl border border-dashed" id="emptyPreview">
                    写真を追加するとここにプレビューが表示されます
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-4"></div>
        <h2 class="text-xl font-semibold text-gray-800" id="loadingText">処理中...</h2>
        <p class="text-gray-500 mt-2 text-sm" id="loadingSubText">しばらくお待ちください</p>
    </div>

    <script>
        // State variables
        let photos = []; // Array of objects: { file, date, originalName, newName, previewUrl }

        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const propNameInput = document.getElementById('propName');
        const roomNumInput = document.getElementById('roomNum');
        const previewGrid = document.getElementById('previewGrid');
        const emptyPreview = document.getElementById('emptyPreview');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const fileCountText = document.getElementById('fileCountText');
        const previewBadge = document.getElementById('previewBadge');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const dropZone = document.getElementById('dropZone');

        // Event Listeners
        fileInput.addEventListener('change', handleFileSelect);
        propNameInput.addEventListener('input', updateNamesAndPreview);
        roomNumInput.addEventListener('input', updateNamesAndPreview);
        downloadBtn.addEventListener('click', generateZip);
        clearBtn.addEventListener('click', clearAll);

        // Drag and Drop Effects
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-blue-50', 'border-blue-400');
        });
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-400');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-400');
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect({ target: { files: e.dataTransfer.files } });
            }
        });

        // Helper: Format Date
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            const s = String(date.getSeconds()).padStart(2, '0');
            return `${y}/${m}/${d} ${h}:${min}:${s}`;
        }

        // Helper: Format zero-padded number
        function padNumber(num, size = 4) {
            let s = String(num);
            while (s.length < size) s = "0" + s;
            return s;
        }

        function showLoading(text) {
            loadingText.innerText = text;
            loadingOverlay.classList.remove('hidden');
            loadingOverlay.classList.add('flex');
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
            loadingOverlay.classList.remove('flex');
        }

        // Main logic to handle selected files
        async function handleFileSelect(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            showLoading("写真を解析中...");
            
            // Cleanup previous previews
            photos.forEach(p => URL.revokeObjectURL(p.previewUrl));
            photos = [];

            // Process each file
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                let dateTaken = new Date(file.lastModified); // Fallback date
                let isExif = false;

                try {
                    // Try to parse EXIF DateTimeOriginal
                    const exifData = await exifr.parse(file, ['DateTimeOriginal']);
                    if (exifData && exifData.DateTimeOriginal) {
                        dateTaken = new Date(exifData.DateTimeOriginal);
                        isExif = true;
                    }
                } catch (e) {
                    console.log(`Could not read EXIF for ${file.name}, using modified date.`);
                }

                photos.push({
                    file: file,
                    date: dateTaken,
                    isExif: isExif,
                    originalName: file.name,
                    newName: '', // Will be set later
                    previewUrl: URL.createObjectURL(file)
                });
            }

            // Sort by date (oldest first)
            photos.sort((a, b) => a.date.getTime() - b.date.getTime());

            updateNamesAndPreview();
            
            // Update UI states
            fileCountText.innerText = `${photos.length} ファイル選択中`;
            previewBadge.innerText = `${photos.length} 枚`;
            previewBadge.classList.remove('hidden');
            downloadBtn.disabled = false;
            clearBtn.classList.remove('hidden');
            emptyPreview.style.display = 'none';

            hideLoading();
        }

        // Update filenames based on input and re-render preview
        function updateNamesAndPreview() {
            const propName = propNameInput.value.trim();
            const roomNum = roomNumInput.value.trim();
            
            // Default base name if both are empty
            const baseName = (propName || roomNum) ? `${propName}${roomNum}` : 'photo';

            photos.forEach((photo, index) => {
                // Get original extension
                const extMatch = photo.originalName.match(/\.([^.]+)$/);
                const ext = extMatch ? `.${extMatch[1]}` : '.jpg';
                
                // Set new name (e.g., 物件名部屋番号_0001.jpg)
                photo.newName = `${baseName}_${padNumber(index + 1)}${ext}`;
            });

            renderPreview();
        }

        // Render the preview grid
        function renderPreview() {
            // Remove existing items (keep the empty state message hidden)
            const existingItems = previewGrid.querySelectorAll('.preview-item');
            existingItems.forEach(item => item.remove());

            photos.forEach(photo => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'preview-item bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden flex flex-col group';
                
                itemDiv.innerHTML = `
                    <div class="h-32 bg-gray-100 relative">
                        <img src="${photo.previewUrl}" class="w-full h-full object-cover" alt="preview">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span class="text-white text-xs font-medium px-2 py-1 bg-black/50 rounded">${photo.originalName}</span>
                        </div>
                    </div>
                    <div class="p-3 flex-1 flex flex-col justify-between">
                        <div>
                            <p class="font-bold text-sm text-blue-700 truncate" title="${photo.newName}">${photo.newName}</p>
                            <p class="text-[10px] text-gray-500 truncate mt-1" title="${photo.originalName}">旧: ${photo.originalName}</p>
                        </div>
                        <div class="mt-2 flex items-center gap-1 text-[11px] text-gray-600 bg-gray-50 p-1 rounded">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            ${formatDate(photo.date)}
                            ${!photo.isExif ? '<span class="text-[9px] text-orange-500" title="Exifがなく更新日時を使用">(更新日)</span>' : ''}
                        </div>
                    </div>
                `;
                previewGrid.appendChild(itemDiv);
            });
        }

        // Generate and download ZIP file
        async function generateZip() {
            if (photos.length === 0) return;
            
            showLoading("ZIPファイルを作成中...");
            
            try {
                const zip = new JSZip();
                
                // Add all files to ZIP with their new names
                photos.forEach(photo => {
                    zip.file(photo.newName, photo.file);
                });
                
                // Determine ZIP file name
                const propName = propNameInput.value.trim();
                const roomNum = roomNumInput.value.trim();
                const zipName = (propName || roomNum) ? `${propName}${roomNum}_Photos.zip` : 'Renamed_Photos.zip';

                // Generate ZIP Blob
                const content = await zip.generateAsync({
                    type: "blob",
                    compression: "STORE", // Use STORE (no compression) for faster zipping of already compressed JPGs
                });
                
                // Trigger download
                const url = URL.createObjectURL(content);
                const a = document.createElement("a");
                a.href = url;
                a.download = zipName;
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                
            } catch (error) {
                console.error("ZIP Generation Error:", error);
                alert("ZIPファイルの作成中にエラーが発生しました。");
            } finally {
                hideLoading();
            }
        }

        // Clear all selected files and reset UI
        function clearAll() {
            photos.forEach(p => URL.revokeObjectURL(p.previewUrl));
            photos = [];
            fileInput.value = '';
            
            const existingItems = previewGrid.querySelectorAll('.preview-item');
            existingItems.forEach(item => item.remove());
            
            emptyPreview.style.display = 'block';
            fileCountText.innerText = 'ファイルは選択されていません';
            previewBadge.classList.add('hidden');
            downloadBtn.disabled = true;
            clearBtn.classList.add('hidden');
        }
    </script>
</body>
</html>
